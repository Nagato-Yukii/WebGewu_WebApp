<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/main.css">
  <title>WebRL WebApp</title>
</head>
<body>
  <div id="container">
    <h1>WebRL WebApp</h1>

    <section>
      <p>这是当前仓库保留的最小 Web 端运行入口。</p>
      <p>它负责提供 Receiver 页面、同源 WebSocket 信令，以及本地 WebTinkerRL 启动接口。</p>
    </section>

    <section>
      <h2>入口</h2>
      <p><a href="receiver/index.html">打开 Receiver 页面</a></p>
    </section>

    <section>
      <h2>保留能力</h2>
      <p>1. 接收 Unity Render Streaming 视频流。</p>
      <p>2. 通过 DataChannel 回传浏览器输入与控制命令。</p>
      <p>3. 支持 WebRL / RoboHeTu / WebTinkerRL 场景切换。</p>
      <p>4. 暴露 <code>/config</code> 和 <code>/api/tinker/local-session</code> 接口。</p>
    </section>
  </div>
</body>
</html>
